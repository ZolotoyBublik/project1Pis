<!DOCTYPE html>
<html>
<head>
    <title>Вход — Django Public Blog</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body>
    <div class="header"><img src="{{ STATIC_URL }}img/logo.png" alt="Логотип" /></div>
    <div class="content">
        <h1>Вход</h1>
        <form method="POST">{% csrf_token %}
            <input type="text"     name="username" placeholder="Логин">
            <input type="password" name="password" placeholder="Пароль">
            <input type="submit" value="Войти">
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <p><a href="/register/">Нет аккаунта? Зарегистрироваться</a></p>
    </div>
</body>
</html>
