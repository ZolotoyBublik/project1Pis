{% extends 'blog/base.html' %}

{% block title %}Все посты{% endblock %}

{% block content %}
<h1>Все посты</h1>

{% for post in posts %}
    <div class="post">
        <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
        <p class="date">{{ post.created_date }}</p>
        <p>{{ post.text|truncatewords:20 }}</p>
    </div>
{% empty %}
    <p>Постов пока нет.</p>
{% endfor %}
{% endblock %}
