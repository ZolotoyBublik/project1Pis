<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body class="archive">
    <div class="header">
        <img src="{{ STATIC_URL }}img/logo.png" alt="Логотип" />
        <!-- Задание: ссылка на регистрацию вверху справа -->
        <div class="header-links">
            <a href="/register/">Регистрация</a>
            <a href="/login/">Войти</a>
        </div>
    </div>
    <div class="archive">
        {% if request.user.is_authenticated %}
        <p><a href="/article/new/">+ Написать статью</a></p>
        {% endif %}
        {% for post in posts %}
        <div class="one-post">
            <h2 class="post-title">
                <a href="/article/{{ post.id }}/">{{ post.title }}</a>
            </h2>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
