<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Все посты</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <img src="/static/logo.png" class="logo">
    <h1>Блог</h1>
</header>

<div class="container">
    <a href="/post/new/" class="create-btn">+ Новый пост</a>

    {% for post in posts %}
        <div class="post">
            <h2><a href="/post/{{ post.pk }}/">{{ post.title }}</a></h2>
            <p class="date">{{ post.created_date }}</p>
            <p>{{ post.text|truncatewords:20 }}</p>
        </div>
    {% empty %}
        <p>Постов пока нет.</p>
    {% endfor %}
</div>

</body>
</html>
